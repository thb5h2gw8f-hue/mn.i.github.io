<!DOCTYPE html>
<html>
<head>
<title>My Character</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffd6e7;
}

.header {
  height: 70px;
  background: white;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 15px;
  border-bottom: 1px solid #ccc;
}

.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: gray;
}

.chat {
  height: 70vh;
  padding: 15px;
  overflow-y: auto;
}

.char {
  background: white;
  padding: 10px;
  border-radius: 15px;
  width: fit-content;
  max-width: 70%;
  margin: 10px;
}

.user {
  background: #ddd;
  padding: 10px;
  border-radius: 15px;
  width: fit-content;
  max-width: 70%;
  margin: 10px 10px 10px auto;
}

.input {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
}

input {
  width: 75%;
  padding: 10px;
}

button {
  padding: 10px;
}
</style>

</head>

<body>

<div class="header">
<div class="avatar"></div>
<div>
<b>Tên nhân vật</b><br>
<span>AI Character</span>
</div>
</div>


<div class="chat">

<div class="char">
Xin chào, tôi là nhân vật của bạn.
</div>

<div class="user">
Hello!
</div>

</div>


<div class="input">
<input placeholder="Nhắn tin...">
<button>Gửi</button>
</div>


</body>
</html>

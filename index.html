<!DOCTYPE html>
<html>

<head>

<title>My Character</title>

<style>

* {
  box-sizing: border-box;
}


body {

  margin:0;
  height:100vh;

  background:#ffd6e7;

  font-family:Arial, sans-serif;

  display:flex;
  flex-direction:column;

}



/* PHẦN TRÊN */

.header {

  height:180px;

  background:#fff0f7;

  display:flex;

  align-items:center;

  gap:30px;

  padding:25px;

  border-bottom:3px solid #e8b8cc;

}



.avatar {

  width:120px;
  height:120px;

  border-radius:50%;

  background:#aaa;

  flex-shrink:0;

}



.header b {

  font-size:42px;

}



.header span {

  font-size:25px;

  color:#666;

}



/* KHUNG CHAT */


.chat {

  flex:1;

  padding:25px;

  overflow-y:auto;

}



/* TIN NHẮN */


.char {

  background:white;

  max-width:75%;

  width:fit-content;

  padding:25px;

  margin:20px 0;

  border-radius:35px;

  font-size:30px;

}



.user {

  background:#ff91c7;

  max-width:75%;

  width:fit-content;

  padding:25px;

  margin:20px 0 20px auto;

  border-radius:35px;

  font-size:30px;

}



/* THANH NHẬP */


.input {

  background:white;

  padding:25px;

  display:flex;

  gap:20px;

  border-top:2px solid #ddd;

}



input {

  flex:1;

  font-size:30px;

  padding:25px;

  border-radius:45px;

  border:2px solid #ccc;

}



button {

  font-size:30px;

  padding:25px 40px;

  border:none;

  border-radius:45px;

  background:#ff7fba;

}



</style>


</head>



<body>



<div class="header">


<div class="avatar"></div>


<div>

<b>Luna</b>

<br>

<span>AI Character</span>


</div>


</div>





<div class="chat">



<div class="char">

Xin chào, tôi là Luna. Rất vui được gặp bạn.

</div>



<div class="user">

Hello!

</div>



</div>





<div class="input">


<input placeholder="Nhắn tin...">


<button>Gửi</button>


</div>




</body>

</html>

<!DOCTYPE html>
<html>
<head>

<title>My Character</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffd6e7;
  height: 100vh;
  display: flex;
  flex-direction: column;
}


/* THANH NHÂN VẬT */

.header {

  height: 150px;
  background: #fff0f7;

  display: flex;
  align-items: center;

  padding: 20px;
  gap: 20px;

  border-bottom: 2px solid #e8b8cc;

}


.avatar {

  width: 100px;
  height: 100px;

  border-radius: 50%;

  background: #aaa;

}


/* TÊN */

.header b {

  font-size: 32px;

}


.header span {

  font-size: 20px;
  color: #666;

}



/* CHAT */

.chat {

  flex: 1;

  padding: 20px;

  overflow-y: auto;

}



/* BÓNG CHAT */

.char {

  background: white;

  max-width: 75%;

  width: fit-content;

  padding: 18px;

  margin: 15px 0;

  border-radius: 25px;

  font-size: 22px;

}



.user {

  background: #ff91c7;

  max-width: 75%;

  width: fit-content;

  padding: 18px;

  margin: 15px 0 15px auto;

  border-radius: 25px;

  font-size: 22px;

}



/* NHẬP TIN */

.input {

  background: white;

  padding: 20px;

  display: flex;

  gap: 15px;

  border-top: 2px solid #ddd;

}



input {

  flex: 1;

  padding: 18px;

  font-size: 22px;

  border-radius: 30px;

  border: 1px solid #ccc;

}



button {

  padding: 18px 30px;

  font-size: 22px;

  border: none;

  border-radius: 30px;

  background: #ff7fba;

}


</style>

</head>


<body>


<div class="header">

<div class="avatar"></div>

<div>

<b>Luna</b>

<br>

<span>AI Character</span>

</div>

</div>



<div class="chat">


<div class="char">

Xin chào, tôi là Luna. Rất vui được gặp bạn.

</div>


<div class="user">

Hello!

</div>


</div>



<div class="input">

<input placeholder="Nhắn tin...">

<button>Gửi</button>

</div>



</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>My Character</title>

<style>

* {
  box-sizing: border-box;
}

body {

  margin:0;
  height:100vh;

  background:#ffd6e7;

  font-family:Arial;

  display:flex;
  flex-direction:column;

}



/* HEADER */

.header {

  height:250px;

  background:#fff0f7;

  display:flex;

  align-items:center;

  gap:40px;

  padding:40px;

  border-bottom:4px solid #e8b8cc;

}



.avatar {

  width:180px;
  height:180px;

  border-radius:50%;

  background:#aaa;

}



.header b {

  font-size:60px;

}


.header span {

  font-size:35px;

}



/* CHAT */

.chat {

  flex:1;

  padding:40px;

  overflow:auto;

}



.char {

  background:white;

  max-width:80%;

  padding:35px;

  margin:30px 0;

  border-radius:50px;

  font-size:45px;

}



.user {

  background:#ff91c7;

  max-width:80%;

  padding:35px;

  margin:30px 0 30px auto;

  border-radius:50px;

  font-size:45px;

}



/* INPUT */


.input {

  background:white;

  padding:35px;

  display:flex;

  gap:25px;

}



input {

  flex:1;

  font-size:45px;

  padding:35px;

  border-radius:60px;

  border:3px solid #ccc;

}



button {

  font-size:45px;

  padding:35px 50px;

  border:none;

  border-radius:60px;

  background:#ff7fba;

}


</style>


</head>


<body>


<div class="header">

<div class="avatar"></div>

<div>

<b>Luna</b>

<br>

<span>AI Character</span>

</div>

</div>



<div class="chat">


<div class="char">

Xin chào, tôi là Luna. Rất vui được gặp bạn.

</div>


<div class="user">

Hello!

</div>


</div>



<div class="input">

<input placeholder="Nhắn tin...">

<button>Gửi</button>

</div>


</body>

</html>
